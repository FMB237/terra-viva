services:
  - type: web
    name: terra-viva
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DISABLE_DOCS
        value: "true"
    database:
      - name: terra_viva_db
        databaseName: terra_viva
        user: terra_viva